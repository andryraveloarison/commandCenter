services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: commandcenter-db
    environment:
      POSTGRES_USER: commandcenter
      POSTGRES_PASSWORD: CommandCenter2026
      POSTGRES_DB: commandcenter
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - commandcenter-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U commandcenter" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: commandcenter-api
    environment:
      DATABASE_URL: postgresql://commandcenter:CommandCenter2026@postgres:5432/commandcenter
      JWT_SECRET: command-center-secret-key-military-operations
      JWT_EXPIRATION: 7d
      NODE_ENV: development
      PORT: 3000
      FRONTEND_URL: http://${SERVER_HOST:-localhost}:5174
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - commandcenter-network
    command: sh -c "npx prisma generate && npx prisma db push --accept-data-loss && npm run start:dev"

  # Prisma Studio
  prisma-studio:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: commandcenter-prisma-studio
    environment:
      DATABASE_URL: postgresql://commandcenter:CommandCenter2026@postgres:5432/commandcenter
    ports:
      - "5557:5556"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - commandcenter-network
    command: sh -c "npx prisma generate && npx prisma studio --port 5556 --hostname 0.0.0.0 --browser none"

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: commandcenter-web
    environment:
      VITE_API_URL: http://${SERVER_HOST:-localhost}:3000/api
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5174:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - commandcenter-network
    command: npm run dev -- --host

volumes:
  postgres_data:

networks:
  commandcenter-network:
    driver: bridge
